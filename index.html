<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SVG Trimmer</title>
    
    <link rel="icon" href="image_90.png">
    <link rel="apple-touch-icon" href="image_90.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #ccc;
            --radius: 15px;
        }

        /* iOS Safari 全体ガード */
        * {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        textarea {
            -webkit-user-select: text !important;
            user-select: text !important;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f5f5f5;
            color: var(--main);
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        /* プレビュー背景 */
        #preview-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background-color: #fff;
            background-image: 
                linear-gradient(45deg, #eee 25%, transparent 25%), 
                linear-gradient(-45deg, #eee 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #eee 75%), 
                linear-gradient(-45deg, transparent 75%, #eee 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
        }
        #preview-bg svg { max-width: 80%; max-height: 50%; object-fit: contain; }

        /* ボトムユニット */
        .ui-layer {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            z-index: 100;
            padding: 10px 15px calc(25px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, #f5f5f5 85%, transparent);
            pointer-events: none;
        }

        .panel {
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 15px;
            border-radius: var(--radius);
            box-shadow: 0 -5px 30px rgba(0,0,0,0.1);
            border: 1px solid var(--accent);
            pointer-events: auto;
            max-width: 420px;
            margin: 0 auto;
        }

        .row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
        h1 { font-size: 1rem; font-weight: 900; margin: 0; }
        .rate { font-size: 0.7rem; color: #888; font-weight: 800; margin-left: auto; }

        textarea {
            width: 100%; height: 80px; padding: 12px;
            border: 2px solid var(--accent); border-radius: 10px;
            font-size: 0.75rem; font-family: monospace;
            background: #fafafa; outline: none; resize: none; margin-bottom: 10px;
        }

        .btns { display: flex; gap: 8px; margin-bottom: 10px; }
        .b {
            flex: 1; height: 48px; border-radius: 10px; border: none;
            font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center;
            touch-action: manipulation;
        }
        .b-main { background: var(--main); color: #fff; font-size: 0.9rem; }
        .b-sub { background: #eee; color: var(--main); font-size: 1.1rem; flex: 0.3; }
        .b:active { opacity: 0.7; transform: scale(0.96); }

        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--main); color: #fff; padding: 10px 20px;
            border-radius: 20px; font-size: 0.8rem; font-weight: 800;
            opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 1000;
        }

        .links { display: flex; gap: 8px; margin-top: 10px; max-width: 420px; margin-left: auto; margin-right: auto; pointer-events: auto; }
        .link { flex: 1; background: #fff; border: 1px solid var(--accent); padding: 12px; border-radius: 10px; text-decoration: none; color: var(--main); font-size: 10px; font-weight: 700; text-align: center; }

        footer { margin-top: 12px; text-align: center; font-size: 9px; color: #aaa; font-weight: 600; pointer-events: auto; }

        /* モーダル */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 200;
            pointer-events: auto;
        }
        .modal-content {
            background: #fff; width: 85%; max-width: 320px; padding: 30px;
            border-radius: var(--radius); position: relative;
        }
    </style>
</head>
<body>

<div id="preview-bg">
    <div id="svg-display" style="color:#ddd; font-weight:900;">PREVIEW</div>
</div>

<div id="toast">Copied!</div>

<div class="ui-layer">
    <div class="panel">
        <div class="row">
            <h1>SVG Trimmer</h1>
            <div class="rate" id="resRate">Reduced: 0%</div>
        </div>

        <textarea id="svgIn" placeholder="Paste SVG Code here..." oninput="shaveSVG()"></textarea>

        <div class="btns">
            <button class="b b-sub" onclick="resetIn()">×</button>
            <button class="b b-main" onclick="copySVG()">Copy Trimmed SVG</button>
        </div>
    </div>

    <div class="links">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="link">☕️ buy me a coffee</a>
        <button class="link" onclick="openM()">📱 Add to Home</button>
    </div>

    <footer>
        No login / No tracking / No ads / Browser only<br>
        <a href="https://afrorakda.com/privacy/" style="color:inherit;">Privacy Policy</a> / afrorakda © 2026
    </footer>
</div>

<div id="modal" onclick="closeM()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <span style="position:absolute; top:15px; right:20px; font-size:24px; color:#888; cursor:pointer;" onclick="closeM()">×</span>
        <h3 style="margin-top:0">📱 Install</h3>
        <p style="font-size:0.9rem">Add to your home screen.</p>
        <p style="font-size:0.8rem">🍏 <strong>iPhone:</strong> Tap Share, then Add to Home Screen.</p>
        <p style="font-size:0.8rem">🤖 <strong>Android:</strong> Tap Menu (⋮), then Add to Home Screen.</p>
    </div>
</div>

<script>
    var inputEl = document.getElementById('svgIn');
    var dispEl = document.getElementById('svg-display');
    var rateEl = document.getElementById('resRate');
    var toastEl = document.getElementById('toast');
    var modalEl = document.getElementById('modal');
    var finalSVG = "";

    function shaveSVG() {
        var raw = inputEl.value.trim();
        if (!raw) {
            dispEl.innerHTML = "PREVIEW";
            rateEl.innerText = "Reduced: 0%";
            finalSVG = "";
            return;
        }

        try {
            var clean = raw
                .replace(/<\?xml.*?\?>/gi, '')
                .replace(/<!DOCTYPE.*?>/gi, '')
                .replace(//g, '')
                .replace(/\s(id|class|version|xmlns:xlink|xml:space|enable-background|x|y|style|sodipodi:docname|inkscape:version)=".*?"/gi, '')
                .replace(/(\d+\.\d{3,})/g, function(m) { return parseFloat(parseFloat(m).toFixed(2)); })
                .replace(/>\s+</g, '><')
                .trim();

            finalSVG = clean;
            dispEl.innerHTML = finalSVG;
            
            var r = Math.round(((raw.length - clean.length) / raw.length) * 100);
            rateEl.innerText = "Reduced: " + (r > 0 ? r : 0) + "%";
        } catch (e) {
            dispEl.innerHTML = '<span style="color:red">Parse Error</span>';
        }
    }

    function resetIn() {
        inputEl.value = '';
        shaveSVG();
        inputEl.focus();
    }

    function copySVG() {
        inputEl.blur(); // フォーカス解除
        if (!finalSVG) return;
        
        // フォールバック付きコピー
        var temp = document.createElement('textarea');
        temp.value = finalSVG;
        document.body.appendChild(temp);
        temp.select();
        try {
            document.execCommand('copy');
            toastEl.style.opacity = '1';
            setTimeout(function() { toastEl.style.opacity = '0'; }, 1200);
        } catch (err) {
            console.log('Copy Error');
        }
        document.body.removeChild(temp);
    }

    function openM() { modalEl.style.display = 'flex'; }
    function closeM() { modalEl.style.display = 'none'; }
</script>

</body>
</html>
