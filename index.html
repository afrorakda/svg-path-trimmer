<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG Trimmer - SIMPLE</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fff; color: #333; }
        .box { max-width: 400px; margin: 0 auto; }
        h1 { font-size: 1.2rem; }
        
        /* テキストエリアを最優先 */
        textarea {
            width: 100%; height: 150px;
            border: 2px solid #ccc; border-radius: 10px;
            padding: 10px; font-size: 16px; /* iOSのズーム防止 */
            margin-bottom: 20px;
            display: block;
        }

        /* 巨大で原始的なボタン */
        .btn-link {
            display: block; width: 100%; padding: 20px;
            background: #333; color: #fff; text-align: center;
            text-decoration: none; border-radius: 15px;
            font-weight: bold; font-size: 1.2rem;
            margin-bottom: 15px;
        }

        .stat-view {
            padding: 20px; background: #eee; border-radius: 10px;
            text-align: center; font-weight: bold; margin-bottom: 20px;
        }

        /* モーダルも単純に */
        #mdl {
            display: none; position: fixed; top: 0; left: 0; 
            width: 100%; height: 100%; background: rgba(0,0,0,0.8);
            justify-content: center; align-items: center; z-index: 999;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>SVG Trimmer (SIMPLE TEST)</h1>
    
    <textarea id="txtIn" placeholder="PASTE SVG HERE"></textarea>

    <a href="javascript:void(0)" class="btn-link" onclick="shaveNow()">1. SHAVE & COPY</a>

    <div class="stat-view" id="resVal">Reduced: --- %</div>

    <a href="javascript:void(0)" class="btn-link" style="background:#aaa" onclick="document.getElementById('mdl').style.display='flex'">2. OPEN MODAL</a>
    
    <p style="font-size: 10px; color: #999; text-align: center;">afrorakda &copy; 2026</p>
</div>

<div id="mdl" onclick="this.style.display='none'">
    <div style="background:#fff; padding:40px; border-radius:20px; width:80%;">
        <h3>MODAL WORKS</h3>
        <p>Close by tapping outside.</p>
    </div>
</div>

<script>
    function shaveNow() {
        var input = document.getElementById('txtIn');
        var val = input.value.trim();
        var res = document.getElementById('resVal');

        if(!val) {
            alert('EMPTY');
            return;
        }

        try {
            // 最も単純な置換（スペースを消すだけ）でテスト
            var cleaned = val.replace(/\s+/g, ' ');
            
            // 削減率を表示
            var pct = Math.round(((val.length - cleaned.length) / val.length) * 100);
            res.innerText = "Reduced: " + pct + "%";

            // コピー
            var tmp = document.createElement('textarea');
            tmp.value = cleaned;
            document.body.appendChild(tmp);
            tmp.select();
            document.execCommand('copy');
            document.body.removeChild(tmp);

            alert('DONE & COPIED: ' + pct + '%');

        } catch(e) {
            alert('ERROR: ' + e.message);
        }
    }
</script>

</body>
</html>
