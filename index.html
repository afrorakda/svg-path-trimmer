<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SVG Trimmer</title>
</head>
<body style="background:#fff; font-family:sans-serif; margin:0; padding:40px 20px; text-align:center; color:#333;">

    <h1 style="font-size:1.5rem; font-weight:900; margin-bottom:0;">SVG Trimmer</h1>
    <p style="font-size:0.8rem; color:#888; margin-bottom:30px;">Paste to Shave</p>
    
    <div style="text-align:left; font-size:11px; font-weight:bold; color:#aaa; margin-bottom:5px;">INPUT</div>
    <textarea id="I" style="width:100%; height:120px; border:2px solid #eee; border-radius:15px; padding:15px; font-size:16px; background:#fafafa; outline:none; margin-bottom:20px;" 
        placeholder="Paste SVG here..." oninput="s()"></textarea>

    <div id="L" style="background:#f0f0f0; padding:15px; border-radius:15px; font-weight:bold; font-size:0.9rem; margin-bottom:20px;">Reduced: --- %</div>

    <div style="text-align:left; font-size:11px; font-weight:bold; color:#aaa; margin-bottom:5px;">RESULT (TAP TO SELECT)</div>
    <textarea id="O" style="width:100%; height:120px; border:2px dashed #ccc; border-radius:15px; padding:15px; font-size:14px; background:#fff; outline:none;" 
        readonly onclick="this.select()"></textarea>

    <div style="margin-top:30px; padding:15px; background:#eee; border-radius:15px; font-weight:bold; font-size:0.8rem;" 
        onclick="alert('iPhone: Share > Add to Home')">
        📱 Add to Home Screen
    </div>

    <footer style="margin-top:50px; font-size:10px; color:#bbb;">
        No login / No tracking / No ads / Browser only<br>
        afrorakda &copy; 2026
    </footer>

    <script>
        function s() {
            var i = document.getElementById('I');
            var o = document.getElementById('O');
            var l = document.getElementById('L');
            var v = i.value.trim();

            if(!v) { o.value=""; l.innerText="Reduced: --- %"; return; }

            try {
                var c = v;
                // iPhoneが嫌がらない最小限の置換
                c = c.replace(/<\?xml.*?\?>/gi, '');
                c = c.replace(/<!DOCTYPE.*?>/gi, '');
                c = c.replace(//g, '');
                c = c.replace(/<metadata>[\s\S]*?<\/metadata>/gi, '');
                
                // 小数点丸め（これが動けば勝利）
                c = c.replace(/(\d+\.\d{3,})/g, function(m) {
                    return parseFloat(m).toFixed(2);
                });

                // 詰め
                c = c.replace(/>\s+</g, '><');
                c = c.trim();

                o.value = c;
                var p = Math.round(((v.length - c.length) / v.length) * 100);
                l.innerText = "Reduced: " + (p > 0 ? p : 0) + "%";
            } catch(e) {
                o.value = "Error";
            }
        }
    </script>

</body>
</html>
