<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SVG Trimmer</title>
    
    <link rel="icon" href="image_90.png">
    <link rel="apple-touch-icon" href="image_90.png">

    <style>
        :root {
            --main: #333;
            --bg: #fff;
            --accent: #ccc;
            --radius: 15px;
        }

        /* 長押し禁止・選択禁止（最小限） */
        * {
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        /* 入力エリアのみ入力を許可 */
        textarea {
            -webkit-user-select: text !important;
            user-select: text !important;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f0f0;
            color: var(--main);
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }

        /* プレビュー（背面） */
        #preview-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background-color: #fff;
            background-image: 
                linear-gradient(45deg, #eee 25%, transparent 25%), 
                linear-gradient(-45deg, #eee 25%, transparent 25%), 
                linear-gradient(45deg, transparent 75%, #eee 75%), 
                linear-gradient(-45deg, transparent 75%, #eee 75%);
            background-size: 20px 20px;
        }
        #preview-bg svg { max-width: 80%; max-height: 45%; object-fit: contain; }

        /* 操作パネル（前面） */
        .ui-layer {
            position: fixed;
            bottom: 0; left: 0; width: 100%;
            z-index: 100;
            padding: 10px 15px calc(35px + env(safe-area-inset-bottom));
            background: linear-gradient(to top, #f0f0f0 80%, transparent);
            pointer-events: none; /* 背後のタップを邪魔しない */
        }

        .panel {
            background: #fff;
            padding: 15px;
            border-radius: var(--radius);
            box-shadow: 0 -5px 25px rgba(0,0,0,0.1);
            border: 1px solid var(--accent);
            max-width: 420px;
            margin: 0 auto;
            pointer-events: auto; /* パネル内はタップ可能 */
        }

        .info { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 10px; }
        h1 { font-size: 1rem; font-weight: 900; margin: 0; }
        .stat { font-size: 0.7rem; color: #888; font-weight: 800; }

        textarea {
            width: 100%; height: 80px; padding: 12px;
            border: 2px solid var(--accent); border-radius: 10px;
            font-size: 0.8rem; font-family: monospace;
            background: #fafafa; outline: none; resize: none; margin-bottom: 10px;
        }

        .btns { display: flex; gap: 8px; margin-bottom: 10px; }
        .b {
            flex: 1; height: 50px; border-radius: 10px; border: none;
            font-weight: 800; cursor: pointer;
        }
        .b-main { background: var(--main); color: #fff; }
        .b-sub { background: #eee; color: var(--main); flex: 0.3; font-size: 1.2rem; }
        .b:active { opacity: 0.6; }

        .links { display: flex; gap: 8px; margin-top: 10px; max-width: 420px; margin: 10px auto 0; pointer-events: auto; }
        .link { flex: 1; background: #fff; border: 1px solid var(--accent); padding: 12px; border-radius: 10px; text-decoration: none; color: var(--main); font-size: 10px; font-weight: 700; text-align: center; }

        footer { margin-top: 15px; text-align: center; font-size: 9px; color: #bbb; font-weight: 600; pointer-events: auto; }

        /* モーダル */
        #modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 200;
        }
        .modal-body {
            background: #fff; width: 85%; max-width: 320px; padding: 30px;
            border-radius: var(--radius); position: relative;
        }

        #toast {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: var(--main); color: #fff; padding: 10px 20px;
            border-radius: 20px; font-size: 0.8rem; font-weight: 800;
            opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 1000;
        }
    </style>
</head>
<body>

<div id="preview-bg">
    <div id="display" style="color:#ddd; font-weight:900;">PREVIEW</div>
</div>

<div id="toast">Copied!</div>

<div class="ui-layer">
    <div class="panel">
        <div class="info">
            <h1>SVG Trimmer</h1>
            <div class="stat" id="rateText">Reduced: 0%</div>
        </div>

        <textarea id="svgInput" placeholder="Paste SVG Code..." oninput="doShave()"></textarea>

        <div class="btns">
            <button class="b b-sub" onclick="doReset()">×</button>
            <button class="b b-main" onclick="doCopy()">Copy Trimmed SVG</button>
        </div>
    </div>

    <div class="links">
        <a href="https://ko-fi.com/afrorakda" target="_blank" class="link">☕️ buy me a coffee</a>
        <button class="link" onclick="openM()">📱 Add to Home</button>
    </div>

    <footer>
        No login / No tracking / No ads / Browser only<br>
        <a href="https://afrorakda.com/privacy/" style="color:inherit;">Privacy Policy</a> / afrorakda © 2026
    </footer>
</div>

<div id="modal" onclick="closeM()">
    <div class="modal-body" onclick="event.stopPropagation()">
        <span style="position:absolute; top:15px; right:20px; font-size:24px; color:#888; cursor:pointer;" onclick="closeM()">×</span>
        <h3 style="margin-top:0">📱 Install</h3>
        <p style="font-size:0.9rem">Add to your home screen.</p>
        <p style="font-size:0.8rem">🍏 <strong>iPhone:</strong> Tap Share, then Add to Home Screen.</p>
        <p style="font-size:0.8rem">🤖 <strong>Android:</strong> Tap Menu (⋮), then Add to Home Screen.</p>
    </div>
</div>

<script>
    var input = document.getElementById('svgInput');
    var disp = document.getElementById('display');
    var rate = document.getElementById('rateText');
    var toast = document.getElementById('toast');
    var modal = document.getElementById('modal');
    var resultSVG = "";

    function doShave() {
        var str = input.value.trim();
        if (!str) {
            disp.innerHTML = "PREVIEW";
            rate.innerText = "Reduced: 0%";
            resultSVG = "";
            return;
        }

        try {
            var clean = str
                .replace(/<\?xml.*?\?>/gi, '')
                .replace(/<!DOCTYPE.*?>/gi, '')
                .replace(//g, '')
                .replace(/\s(id|class|version|xmlns:xlink|xml:space|enable-background|x|y|style|sodipodi:docname|inkscape:version)=".*?"/gi, '')
                .replace(/(\d+\.\d{3,})/g, function(m) { return parseFloat(parseFloat(m).toFixed(2)); })
                .replace(/>\s+</g, '><')
                .trim();

            resultSVG = clean;
            disp.innerHTML = resultSVG;
            
            var pct = Math.round(((str.length - clean.length) / str.length) * 100);
            rate.innerText = "Reduced: " + (pct > 0 ? pct : 0) + "%";
        } catch (e) {
            disp.innerHTML = '<span style="color:red">Parse Error</span>';
        }
    }

    function doReset() {
        input.value = '';
        doShave();
        input.focus();
    }

    function doCopy() {
        if (!resultSVG) return;
        input.blur();
        
        var t = document.createElement('textarea');
        t.value = resultSVG;
        document.body.appendChild(t);
        t.select();
        try {
            document.execCommand('copy');
            toast.style.opacity = '1';
            setTimeout(function(){ toast.style.opacity = '0'; }, 1200);
        } catch (err) {}
        document.body.removeChild(t);
    }

    function openM() { modal.style.display = 'flex'; }
    function closeM() { modal.style.display = 'none'; }
</script>

</body>
</html>
