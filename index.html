<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SVG Trimmer DEBUG</title>
    
    <style>
        :root { --main: #333; --bg: #fff; --accent: #eee; --radius: 15px; }

        /* 全てのガードを外してシンプルに */
        * { box-sizing: border-box; -webkit-tap-highlight-color: rgba(0,0,0,0.1); }

        body {
            font-family: sans-serif;
            background-color: var(--bg);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .debug-container {
            width: 100%;
            max-width: 400px;
            background: #fff;
            padding: 20px;
            border: 5px solid red; /* デバッグ用 */
            border-radius: var(--radius);
            z-index: 1000;
        }

        h1 { font-size: 1.2rem; text-align: center; }

        textarea {
            width: 100%;
            height: 120px;
            margin-bottom: 20px;
            border: 2px solid #ccc;
            border-radius: 10px;
            padding: 10px;
            font-family: monospace;
            -webkit-user-select: text; /* 確実に打てるように */
        }

        .btn-box {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* 巨大で押しやすいボタン */
        button {
            width: 100%;
            padding: 20px;
            background: var(--main);
            color: #fff;
            border: none;
            border-radius: var(--radius);
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }

        .sub-btn {
            background: #aaa;
        }

        /* プレビュー */
        #view {
            width: 100%;
            min-height: 150px;
            margin-top: 20px;
            border: 2px dashed #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* モーダル */
        #md {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 99999;
            align-items: center;
            justify-content: center;
        }
        .md-c {
            background: #fff;
            padding: 40px;
            border-radius: 20px;
            width: 80%;
            position: relative;
        }
    </style>
</head>
<body>

<div class="debug-container">
    <h1>DEBUG MODE: SVG</h1>
    
    <textarea id="ti" placeholder="PASTE HERE" oninput="run()"></textarea>

    <div class="btn-box">
        <button id="cpBtn" onclick="var t=document.getElementById('ti'); t.blur(); if(window.finalCode){ var a=document.createElement('textarea'); a.value=window.finalCode; document.body.appendChild(a); a.select(); document.execCommand('copy'); document.body.removeChild(a); alert('COPIED'); }">
            COPY TRIMMED
        </button>

        <button class="sub-btn" onclick="document.getElementById('md').style.display='flex'">
            OPEN MODAL TEST
        </button>
    </div>

    <div id="view">PREVIEW HERE</div>
</div>

<div id="md" onclick="this.style.display='none'">
    <div class="md-c" onclick="event.stopPropagation()">
        <h2>MODAL TEST</h2>
        <p>If you see this, buttons are working.</p>
        <button onclick="document.getElementById('md').style.display='none'">CLOSE</button>
    </div>
</div>

<script>
    window.finalCode = "";
    function run() {
        var raw = document.getElementById('ti').value.trim();
        var v = document.getElementById('view');
        if(!raw) { v.innerHTML = "EMPTY"; return; }
        
        try {
            var clean = raw.replace(/<\?xml.*?\?>/gi, '')
                           .replace(/<!DOCTYPE.*?>/gi, '')
                           .replace(//g, '')
                           .replace(/\s(id|class|version|xmlns:xlink|xml:space|enable-background|style)=".*?"/gi, '')
                           .replace(/(\d+\.\d{3,})/g, function(m){ return parseFloat(parseFloat(m).toFixed(2)); })
                           .replace(/>\s+</g, '><')
                           .trim();
            window.finalCode = clean;
            v.innerHTML = clean;
        } catch(e) {
            v.innerHTML = "ERROR";
        }
    }
</script>

</body>
</html>
