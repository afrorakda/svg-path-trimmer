<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG TEST</title>
</head>
<body style="background:#fff; font-family:sans-serif; text-align:center; padding-top:50px;">

    <h2 style="font-size:1.2rem;">FINAL TEST</h2>

    <textarea id="T" style="width:90%; height:100px; border:2px solid #333; border-radius:15px; padding:10px; margin-bottom:20px; font-size:16px;" placeholder="Paste SVG"></textarea>

    <br>

    <button 
        style="width:90%; padding:30px; background:#000; color:#fff; border-radius:15px; font-weight:800; font-size:1.2rem;" 
        onclick="var v=document.getElementById('T').value; if(!v){alert('EMPTY');}else{ var c=v.replace(/\s+/g,' '); var t=document.createElement('textarea'); t.value=c; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); alert('OK: COPIED'); }">
        CLICK ME (COPY)
    </button>

    <br><br>

    <button 
        style="width:90%; padding:20px; background:#eee; color:#000; border-radius:15px; font-weight:800; border:none;" 
        onclick="alert('MODAL TEST OK')">
        TEST ALERT
    </button>

</body>
</html>
