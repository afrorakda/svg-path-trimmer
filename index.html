<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG AUTO</title>
</head>
<body style="background:#fff; font-family:sans-serif; padding:20px; text-align:center;">

    <h3>AUTO SHAVE</h3>

    <p style="font-size:12px;">1. PASTE HERE</p>
    <textarea id="IN" style="width:100%; height:120px; border:2px solid #333; border-radius:15px; font-size:16px;" 
        oninput="var v=this.value; var c=v.replace(/\s+/g,' '); document.getElementById('OUT').value=c;"></textarea>

    <div style="margin:20px 0; font-weight:bold;">↓ AUTOMATIC ↓</div>

    <p style="font-size:12px;">2. COPY THIS RESULT</p>
    <textarea id="OUT" style="width:100%; height:120px; border:2px solid #ccc; border-radius:15px; font-size:16px;" readonly onclick="this.select()"></textarea>

    <p style="font-size:10px; color:#999; margin-top:30px;">If this doesn't work, there is a serious issue with JS execution.</p>

</body>
</html>
